name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - feat/ci-cd
jobs:
  build:
    name: 'Build for ${{ matrix.os }}'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: compactify-linux
          - os: macos-latest
            artifact_name: compactify-macos
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      
      - name: Install libvips (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Install libvips (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install vips
      
      - name: Build binary
        run: |
          CGO_ENABLED=1 go build -ldflags="-w -s" -trimpath -o ${{ matrix.artifact_name }} .
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
  
  create-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Create Github Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            compactify-linux/compactify-linux
            compactify-macos/compactify-macos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}