# Compactify CLI
pre-commit:
  parallel: false
  commands:
    fmt:
      glob: "**/*.go"
      run: make fmt-fix && git add {staged_files}
    vet:
      glob: "**/*.go"
      run: make vet
    test:
      glob: "**/*.go"
      run: make test

commit-msg:
  commands:
    lint:
      run: ./scripts/commitlint.sh {1}